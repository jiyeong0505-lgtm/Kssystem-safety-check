let checkState = {};   // itemId -> yes|no|na
let memoState  = {};   // itemId -> string (일일: 비고)
let weeklyImprove = {}; // itemId -> string (주간: 개선요청)
let monthlyExtra  = {}; // itemId -> {manager, deadline, completed}
let openCats   = {};
let isAdmin    = false;
let editingId  = null;
let currentTab = "check";
let filterDept = "";
let filterType = "";
let detailRec  = null;

// ── 유틸 ─────────────────────────────────────────────────────
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate  = iso => { const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

// ── Firestore 실시간 ──────────────────────────────────────────
const q = query(collection(db, COL), orderBy("date","desc"));
onSnapshot(q, snap => {
  records = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  document.getElementById("sync-time").textContent = "동기화 " + fmtDate(new Date().toISOString());
  if (currentTab === "records") renderRecords();
});

// ── 저장 ─────────────────────────────────────────────────────
async function handleSubmit() {
  if (!dept) { showToast("소속/공정을 선택해주세요.", "error"); return; }
  const items = getAllItems(checkType);
  const answered = items.filter(i => checkState[i.id]);
  if (!answered.length) { showToast("최소 1개 이상 점검 결과를 입력해주세요.", "error"); return; }

  if (!editingId) {
    const today = todayStr();
    const dup = records.find(r => r.date?.slice(0,10)===today && r.dept===dept && r.type===checkType);
    if (dup) { showToast(`오늘 ${dept}\n${CHECKLISTS[checkType].label} 기록이 이미 있습니다.\n기록 조회에서 수정하세요.`, "error"); return; }
  }

  const payload = {
    dept, type: checkType,
    results: {}, memos: {}, weeklyImprove: {}, monthlyExtra: {}
  };
  items.forEach(i => {
    payload.results[i.id]       = checkState[i.id] || null;
    if (memoState[i.id])        payload.memos[i.id] = memoState[i.id];
    if (weeklyImprove[i.id])    payload.weeklyImprove[i.id] = weeklyImprove[i.id];
    if (monthlyExtra[i.id])     payload.monthlyExtra[i.id]  = monthlyExtra[i.id];
  });

  try {
    if (editingId) {
      await updateDoc(doc(db,COL,editingId), { ...payload, updatedAt: new Date().toISOString() });
      showToast("수정 완료! ✓", "success");
    } else {
      await addDoc(collection(db,COL), { ...payload, date: new Date().toISOString() });
      showToast("저장 완료! ✓", "success");
    }
    resetCheck();
    setTimeout(() => switchTab("records"), 800);
  } catch(e) { showToast("저장 실패. 네트워크를 확인해주세요.", "error"); }
}

// ── 수정 모드 ─────────────────────────────────────────────────
function startEdit(rec) {
  checkState={}; memoState={}; weeklyImprove={}; monthlyExtra={};
  getAllItems(rec.type).forEach(i => {
    if (rec.results?.[i.id])       checkState[i.id]     = rec.results[i.id];
    if (rec.memos?.[i.id])         memoState[i.id]      = rec.memos[i.id];
    if (rec.weeklyImprove?.[i.id]) weeklyImprove[i.id]  = rec.weeklyImprove[i.id];
    if (rec.monthlyExtra?.[i.id])  monthlyExtra[i.id]   = rec.monthlyExtra[i.id];
  });
  dept=rec.dept; checkType=rec.type; editingId=rec._id;
  document.getElementById("dept-select").value = rec.dept;
  setCheckType(rec.type);
  switchTab("check");
  window.scrollTo({top:0,behavior:"smooth"});
  showToast("수정 모드: 변경 후 저장하세요.","");
}

// ── 삭제 ─────────────────────────────────────────────────────
async function deleteRecord(id) {
  if (!confirm("이 기록을 삭제하시겠습니까?")) return;
  try { await deleteDoc(doc(db,COL,id)); showToast("삭제되었습니다.","success"); }
  catch { showToast("삭제 실패.","error"); }
}
async function clearAll() {
  if (!confirm("모든 기록을 삭제합니까? 되돌릴 수 없습니다.")) return;
  try { await Promise.all(records.map(r=>deleteDoc(doc(db,COL,r._id)))); showToast("전체 삭제 완료.","success"); }
  catch { showToast("삭제 실패.","error"); }
}

// ── CSV ───────────────────────────────────────────────────────
function exportCSV() {
  if (!records.length) { showToast("내보낼 기록이 없습니다.","error"); return; }
  const rows = [];
  // 헤더
  rows.push(["점검ID","일시","소속/공정","점검구분","카테고리","점검항목","결과","비고/개선요청/담당자","조치기한","완료일","수정일시"]);
  records.forEach(rec => {
    const cl = CHECKLISTS[rec.type];
    if (!cl) return;
    cl.categories.forEach(cat => {
      cat.items.forEach(item => {
        const r   = rec.results?.[item.id] || "";
        const resultLabel = r==="yes"?"예":r==="no"?"아니오":r==="na"?"해당없음":"";
        let extra="", deadline="", completed="";
        if (rec.type==="daily")   extra = rec.memos?.[item.id]||"";
        if (rec.type==="weekly")  extra = rec.weeklyImprove?.[item.id]||"";
        if (rec.type==="monthly") {
          const me = rec.monthlyExtra?.[item.id]||{};
          extra=me.manager||""; deadline=me.deadline||""; completed=me.completed||"";
        }
        rows.push([rec._id.slice(-6), fmtDate(rec.date), rec.dept, cl.label,
          cat.title, item.text, resultLabel, extra, deadline, completed,
          rec.updatedAt?fmtDate(rec.updatedAt):""]);
      });
    });
  });
  const csv = "\uFEFF" + rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = Object.assign(document.createElement("a"),{
    href: URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})),
    download:`안전점검_${todayStr()}.csv`
  });
  a.click();
  showToast("CSV 다운로드 완료!","success");
}

  ["check","records"].forEach(t => {
    document.getElementById("tab-"+t).classList.toggle("tab-active", t===tab);
    document.getElementById("page-"+t).style.display = t===tab?"":"none";
  });
  document.getElementById("submit-bar").style.display = tab==="check"?"":"none";
  if (tab==="records") renderRecords();
}

// ── 점검 유형 변경 ────────────────────────────────────────────
function setCheckType(type) {
  checkType=type; checkState={}; memoState={}; weeklyImprove={}; monthlyExtra={};
  ["daily","weekly","monthly"].forEach(t => {
    document.getElementById("type-btn-"+t).classList.toggle("type-active", t===type);
  });
  renderCheckTab();
}

// ── 렌더: 점검 탭 ─────────────────────────────────────────────
function renderCheckTab() {
  const cl    = CHECKLISTS[checkType];
  const items = getAllItems(checkType);
  const yes   = items.filter(i=>checkState[i.id]==="yes").length;
  const no    = items.filter(i=>checkState[i.id]==="no").length;
  const na    = items.filter(i=>checkState[i.id]==="na").length;
  const total = items.length;

  document.getElementById("sum-total").textContent = total;
  document.getElementById("sum-yes").textContent   = yes;
  document.getElementById("sum-no").textContent    = no;
  document.getElementById("sum-na").textContent    = na;
  document.getElementById("edit-banner").style.display = editingId?"":"none";

  const sb = document.getElementById("save-btn");
  if (editingId) { sb.textContent="✏️ 수정 완료 저장"; sb.style.background="#f59e0b"; sb.style.color="#000"; }
  else           { sb.textContent="💾 점검 완료 저장"; sb.style.background="#10b981"; sb.style.color="#fff"; }

  const con = document.getElementById("cat-container");
  con.innerHTML = "";

  cl.categories.forEach(cat => {
    const done = cat.items.filter(i=>checkState[i.id]).length;
    const pct  = Math.round(done/cat.items.length*100);
    const pColor = pct===100?"#10b981":pct>50?cl.color:"#f59e0b";
    if (openCats[cat.id]===undefined) openCats[cat.id]=true;
    const open = openCats[cat.id];

    const itemsHtml = cat.items.map((item,idx) => {
      const st = checkState[item.id]||"";
      const extraHtml = buildExtraHtml(item.id);
      return `
        <div class="check-item">
          <div class="item-num">${idx+1}</div>
          <div class="item-content">
            <div class="item-txt">${item.text}</div>
            <div class="ans-row">
              <button class="ans-btn ${st==='yes'?'ans-yes':''}" onclick="setCheck('${item.id}','yes')">✓ 예</button>
              <button class="ans-btn ${st==='no'?'ans-no':''}"  onclick="setCheck('${item.id}','no')">✕ 아니오</button>
              <button class="ans-btn ${st==='na'?'ans-na':''}"  onclick="setCheck('${item.id}','na')">— 해당없음</button>
            </div>
            ${extraHtml}
          </div>
        </div>
        ${idx<cat.items.length-1?'<div class="item-divider"></div>':''}
      `;
    }).join('');

    const div = document.createElement("div");
    div.className="cat-block";
    div.innerHTML=`
      <div class="cat-head" onclick="toggleCat('${cat.id}')">
        <div class="cat-icon-box" style="background:${cl.bg};color:${cl.color}">${cat.icon}</div>
        <div>
          <div class="cat-title">${cat.title}</div>
          <div class="cat-sub">${cat.items.length}개 항목</div>
        </div>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pColor}"></div></div>
          <span class="prog-txt">${done}/${cat.items.length}</span>
          <span class="arrow" style="transform:${open?'rotate(0)':'rotate(-90deg)'}"">▾</span>
        </div>
      </div>
      <div class="cat-body" id="catbody-${cat.id}" style="display:${open?'':'none'}">${itemsHtml}</div>
    `;
    con.appendChild(div);
  });
}

function buildExtraHtml(itemId) {
  if (checkType==="daily") {
    const val = memoState[itemId]||"";
    return `<div class="extra-wrap">
      <input type="text" class="extra-input" placeholder="📝 비고 (선택)" value="${val.replace(/"/g,'&quot;')}"
        oninput="memoState['${itemId}']=this.value" />
    </div>`;
  }
  if (checkType==="weekly") {
    const val = weeklyImprove[itemId]||"";
    return `<div class="extra-wrap">
      <input type="text" class="extra-input extra-warn" placeholder="🔧 개선요청사항 (선택)" value="${val.replace(/"/g,'&quot;')}"
        oninput="weeklyImprove['${itemId}']=this.value" />
    </div>`;
  }
  if (checkType==="monthly") {
    const me = monthlyExtra[itemId]||{};
    return `<div class="extra-wrap monthly-extra">
      <input type="text" class="extra-input extra-purple" placeholder="👤 담당자" value="${(me.manager||'').replace(/"/g,'&quot;')}"
        oninput="setMonthly('${itemId}','manager',this.value)" style="flex:1;min-width:80px"/>
      <input type="date" class="extra-input extra-purple" value="${me.deadline||''}"
        oninput="setMonthly('${itemId}','deadline',this.value)" style="flex:1;min-width:110px" title="조치기한"/>
      <input type="date" class="extra-input extra-purple" value="${me.completed||''}"
        oninput="setMonthly('${itemId}','completed',this.value)" style="flex:1;min-width:110px" title="완료일"/>
    </div>
    <div style="display:flex;gap:6px;padding:0 0 2px;font-size:10px;color:#94a3b8;margin-top:-4px">
      <span style="flex:1;padding-left:4px">담당자</span>
      <span style="flex:1;padding-left:4px">조치기한</span>
      <span style="flex:1;padding-left:4px">완료일</span>
    </div>`;
  }
  return "";
}

function setMonthly(itemId, field, val) {
  if (!monthlyExtra[itemId]) monthlyExtra[itemId]={};
  monthlyExtra[itemId][field]=val;
}

function toggleCat(id) {
  openCats[id]=!openCats[id];
  const el=document.getElementById("catbody-"+id);
  const arrow=el?.previousElementSibling?.querySelector(".arrow");
  if(el) el.style.display=openCats[id]?"":"none";
  if(arrow) arrow.style.transform=openCats[id]?"rotate(0)":"rotate(-90deg)";
}

function setCheck(itemId, type) {
  if (checkState[itemId]===type) delete checkState[itemId];
  else checkState[itemId]=type;
  renderCheckTab();
}

// ── 렌더: 기록 탭 ─────────────────────────────────────────────
function renderRecords() {
  const con = document.getElementById("records-container");
  let list = records;
  if (filterDept) list=list.filter(r=>r.dept===filterDept);
  if (filterType) list=list.filter(r=>r.type===filterType);

  document.getElementById("rec-count").textContent = `전체 ${records.length}건`;

  if (!list.length) {
    con.innerHTML=`<div class="empty"><div style="font-size:36px;margin-bottom:12px">📭</div><div>저장된 점검 기록이 없습니다.</div></div>`;
    return;
  }

  con.innerHTML = list.map(rec => {
    const cl = CHECKLISTS[rec.type];
    if(!cl) return "";
    const items = getAllItems(rec.type);
    const rYes=items.filter(i=>rec.results?.[i.id]==="yes").length;
    const rNo =items.filter(i=>rec.results?.[i.id]==="no").length;
    const rNa =items.filter(i=>rec.results?.[i.id]==="na").length;
    const ans=rYes+rNo+rNa;
    const noItems=items.filter(i=>rec.results?.[i.id]==="no");
    const badgeClass=rNo>0?"badge-fail":ans===items.length?"badge-pass":"badge-inc";
    const badgeTxt  =rNo>0?"⚠ 아니오 있음":ans===items.length?"✓ 완료":"⏳ 부분점검";
    const noBox=noItems.length?`
      <div class="ng-box">
        <div class="ng-title">⚠ 아니오 항목</div>
        ${noItems.map(i=>`<div>• ${i.text}</div>`).join('')}
      </div>`:'';
    const delBtn=isAdmin?`<button class="btn btn-danger" onclick="deleteRecord('${rec._id}')">🗑 삭제</button>`:'';
    const typeBadge=`<span class="type-dot" style="background:${cl.color}">${cl.label}</span>`;
    const updTxt=rec.updatedAt?`<div class="upd-txt">✏️ 수정됨: ${fmtDate(rec.updatedAt)}</div>`:'';
    return `
      <div class="rec-card" style="border-color:${rNo>0?'rgba(239,68,68,0.4)':'#1e2d45'}">
        <div class="rec-head">
          <span class="rec-id">#${rec._id.slice(-6)}</span>
          ${typeBadge}
          <span class="badge ${badgeClass}">${badgeTxt}</span>
          <span class="rec-date">${fmtDate(rec.date)}</span>
        </div>
        <div class="rec-meta">
          <span>🏭 ${rec.dept}</span>
          <span>✍ ${ans}/${items.length}</span>
        </div>
        <div class="stat-row">
          <span class="stat-pill pill-yes">✓ 예 ${rYes}</span>
          <span class="stat-pill pill-no">✕ 아니오 ${rNo}</span>
          <span class="stat-pill pill-na">— 해당없음 ${rNa}</span>
        </div>
        ${noBox}
        <div class="rec-actions">
          <button class="btn btn-ghost" onclick='showDetail(${JSON.stringify(rec).replace(/'/g,"&#39;")})'>🔍 상세보기</button>
          <button class="btn btn-primary" onclick='startEdit(${JSON.stringify(rec).replace(/'/g,"&#39;")})'>✏️ 수정</button>
          ${delBtn}
        </div>
        ${updTxt}
      </div>`;
  }).join('');
}

// ── 상세 모달 ─────────────────────────────────────────────────
function showDetail(rec) {
  const cl=CHECKLISTS[rec.type];
  if(!cl) return;
  let html=`
    <div class="detail-row"><span class="dk">소속/공정</span><span>${rec.dept}</span></div>
    <div class="detail-row"><span class="dk">점검구분</span><span style="color:${cl.color};font-weight:600">${cl.label}</span></div>
    <div class="detail-row"><span class="dk">점검일시</span><span>${fmtDate(rec.date)}</span></div>
    ${rec.updatedAt?`<div class="detail-row"><span class="dk">수정일시</span><span>${fmtDate(rec.updatedAt)}</span></div>`:''}
  `;
  cl.categories.forEach(cat=>{
    html+=`<div class="detail-cat">${cat.icon} ${cat.title}</div>`;
    cat.items.forEach(item=>{
      const r=rec.results?.[item.id];
      const color=r==="yes"?"#10b981":r==="no"?"#ef4444":"#64748b";
      const lbl=r==="yes"?"✓ 예":r==="no"?"✕ 아니오":r==="na"?"— 해당없음":"미응답";
      let extra="";
      if(rec.type==="daily"  &&rec.memos?.[item.id])          extra=`<div class="detail-extra">📝 ${rec.memos[item.id]}</div>`;
      if(rec.type==="weekly" &&rec.weeklyImprove?.[item.id])   extra=`<div class="detail-extra" style="color:#f59e0b">🔧 ${rec.weeklyImprove[item.id]}</div>`;
      if(rec.type==="monthly"&&rec.monthlyExtra?.[item.id]){
        const me=rec.monthlyExtra[item.id];
        const parts=[];
        if(me.manager)   parts.push(`👤 ${me.manager}`);
        if(me.deadline)  parts.push(`📅 기한: ${me.deadline}`);
        if(me.completed) parts.push(`✅ 완료: ${me.completed}`);
        if(parts.length) extra=`<div class="detail-extra" style="color:#a855f7">${parts.join(' &nbsp;|&nbsp; ')}</div>`;
      }
      html+=`<div class="detail-row"><span class="dk" style="color:${color};font-weight:600">${lbl}</span><span>${item.text}${extra}</span></div>`;
    });
  });
  document.getElementById("modal-content").innerHTML=html;
  document.getElementById("detail-modal").style.display="flex";
}

// ── 관리자 ───────────────────────────────────────────────────
function handleAdminLogin() {
  const pw=document.getElementById("admin-pw-input").value;
  if(pw===ADMIN_PW){
    isAdmin=true;
    document.getElementById("admin-modal").style.display="none";
    document.getElementById("admin-pw-input").value="";
    document.getElementById("pw-error").style.display="none";
    document.getElementById("admin-badge").style.display="";
    document.getElementById("admin-login-btn").style.display="none";
    document.getElementById("admin-bar").style.display="";
    showToast("관리자 모드 활성화!","success");
    if(currentTab==="records") renderRecords();
  } else { document.getElementById("pw-error").style.display=""; }
}

// ── 토스트 ───────────────────────────────────────────────────
function showToast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast show"+(type?" toast-"+type:"");
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove("show"),3000);
}

// ── 시계 ─────────────────────────────────────────────────────
function startClock(){
  const el=document.getElementById("clock");
  const tick=()=>{if(el)el.textContent=fmtDate(new Date().toISOString());};
  tick(); setInterval(tick,1000);
}

// ── 전역 노출 ─────────────────────────────────────────────────
Object.assign(window,{
  switchTab, setCheckType, setCheck, toggleCat, startEdit,
  deleteRecord, clearAll, exportCSV, showDetail, handleAdminLogin,
  handleSubmit, resetCheck,
  setMonthly,
  onDeptChange: v=>{dept=v;},
  onFilterDept: v=>{filterDept=v; renderRecords();},
  onFilterType: v=>{filterType=v; renderRecords();},
  openAdminModal: ()=>{ document.getElementById("admin-modal").style.display="flex"; },
  closeAdminModal: ()=>{ document.getElementById("admin-modal").style.display="none"; document.getElementById("admin-pw-input").value=""; document.getElementById("pw-error").style.display="none"; },
  closeDetail: ()=>{ document.getElementById("detail-modal").style.display="none"; },
});

document.addEventListener("DOMContentLoaded",()=>{ startClock(); renderCheckTab(); });
</script>

.rec-card{background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:15px 18px;margin-bottom:10px;transition:border-color .15s}
.rec-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.rec-id{font-family:monospace;font-size:11px;color:#475569}
.rec-date{margin-left:auto;font-size:11px;color:#475569}
.rec-meta{display:flex;gap:14px;font-size:13px;color:#94a3b8;flex-wrap:wrap}
.type-dot{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700;background:rgba(255,255,255,.07);color:#f1f5f9}
.stat-row{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.stat-pill{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.pill-yes{background:rgba(16,185,129,.15);color:#10b981}
.pill-no {background:rgba(239,68,68,.15);color:#ef4444}
.pill-na {background:rgba(71,85,105,.18);color:#64748b}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600}
.badge-pass{background:rgba(16,185,129,.2);color:#10b981}
.badge-fail{background:rgba(239,68,68,.2);color:#ef4444}
.badge-inc {background:rgba(245,158,11,.2);color:#f59e0b}
.ng-box{margin-top:10px;padding:10px 12px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:13px;color:#94a3b8;line-height:1.7}
.ng-title{color:#ef4444;font-weight:700;font-size:11px;margin-bottom:4px}
.rec-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.upd-txt{font-size:11px;color:#475569;margin-top:7px}
.empty{text-align:center;padding:60px 0;color:#64748b}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:22px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.detail-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1e2d45;font-size:13px;line-height:1.5}
.detail-row:last-child{border-bottom:none}
.dk{color:#64748b;min-width:90px;flex-shrink:0;padding-top:1px}
.detail-cat{margin:14px 0 6px;font-size:12px;font-weight:700;color:#94a3b8;padding-bottom:4px;border-bottom:1px solid #1e2d45}
.detail-extra{font-size:12px;margin-top:4px}
.pw-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.pw-label{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input.pw-input{background:#1a2235;border:1px solid #1e2d45;border-radius:8px;padding:11px 12px;color:#f1f5f9;font-size:14px;outline:none;width:100%}
.pw-error{font-size:12px;color:#ef4444;margin-top:3px;display:none}
.modal-actions{display:flex;gap:10px;margin-top:16px}

/* TOAST */
.toast{position:fixed;top:18px;right:18px;background:#1a2235;border:1px solid #1e2d45;border-radius:10px;padding:12px 16px;font-size:13px;z-index:400;transform:translateX(130%);transition:transform .3s;max-width:270px;line-height:1.55;word-break:keep-all}
.toast.show{transform:translateX(0)}
.toast-success{border-color:#10b981}
.toast-error{border-color:#ef4444}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#080c18}
::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:600px){
  .summ-grid{grid-template-columns:repeat(2,1fr)}
  .header-right{width:100%;justify-content:flex-end}
  .ans-btn{padding:9px 12px;font-size:14px}
}
</style>
</head>
<body>
<div class="inner">

  <header>
    <div class="logo">🏭</div>
    <div>
      <div class="h1">관리감독자 안전점검 시스템</div>
      <div class="sub" id="clock"></div>
    </div>
    <div class="header-right">
      <span class="live-tag"><span class="live-dot"></span>실시간 공유</span>
      <span id="sync-time" style="font-size:11px;color:#475569"></span>
      <span id="admin-badge" class="admin-tag" style="display:none">👑 관리자</span>
      <button id="admin-login-btn" class="btn btn-admin" style="font-size:12px;padding:7px 13px" onclick="openAdminModal()">🔐 관리자</button>
    </div>
  </header>

  <div class="tabs">
    <button id="tab-check"   class="tab-btn tab-active" onclick="switchTab('check')">✅ 점검하기</button>
    <button id="tab-records" class="tab-btn"            onclick="switchTab('records')">📋 기록 조회</button>
  </div>

  <!-- 점검하기 탭 -->
  <div id="page-check">

    <!-- 점검 유형 선택 -->
    <div class="type-selector">
      <button id="type-btn-daily"   class="type-btn type-daily type-active" onclick="setCheckType('daily')">📅 일일점검<div style="font-size:11px;font-weight:400;margin-top:3px;opacity:.8">작업 전 즉시위험</div></button>
      <button id="type-btn-weekly"  class="type-btn type-weekly"            onclick="setCheckType('weekly')">📆 주간점검<div style="font-size:11px;font-weight:400;margin-top:3px;opacity:.8">유지관리 상태</div></button>
      <button id="type-btn-monthly" class="type-btn type-monthly"           onclick="setCheckType('monthly')">🗓 월간점검<div style="font-size:11px;font-weight:400;margin-top:3px;opacity:.8">법정서류·설비관리</div></button>
    </div>

    <!-- 수정 배너 -->
    <div id="edit-banner" class="edit-banner" style="display:none">
      <span style="font-size:16px">✏️</span>
      <span style="font-size:13px;color:#fbbf24;font-weight:600">수정 모드</span>
      <span style="font-size:12px;color:#94a3b8">기존 내용을 불러왔습니다. 변경 후 저장하세요.</span>
      <button class="btn btn-ghost" style="margin-left:auto;font-size:12px;padding:6px 12px" onclick="resetCheck()">취소</button>
    </div>

    <!-- 요약 -->
    <div class="summ-grid">
      <div class="summ-card"><div class="summ-num" id="sum-total" style="color:#3b82f6">0</div><div class="summ-lbl">전체 항목</div></div>
      <div class="summ-card"><div class="summ-num" id="sum-yes"   style="color:#10b981">0</div><div class="summ-lbl">예</div></div>
      <div class="summ-card"><div class="summ-num" id="sum-no"    style="color:#ef4444">0</div><div class="summ-lbl">아니오</div></div>
      <div class="summ-card"><div class="summ-num" id="sum-na"    style="color:#64748b">0</div><div class="summ-lbl">해당없음</div></div>
    </div>

    <!-- 소속 선택 -->
    <div class="info-bar">
      <label class="field-label">소속 / 공정 선택</label>
      <select id="dept-select" class="field-input" onchange="onDeptChange(this.value)">
        <option value="">-- 소속/공정을 선택하세요 --</option>
        <option>1본부 조립1팀</option>
        <option>1본부 조립2팀</option>
        <option>1본부 조립3팀(1층)</option>
        <option>1본부 조립3팀(2층)</option>
        <option>2본부 가공1팀 1파트</option>
        <option>2본부 가공1팀 2파트</option>
        <option>2본부 가공2팀</option>
        <option>2본부 조립팀 조립1파트</option>
        <option>2본부 조립팀 조립2파트</option>
      </select>
    </div>

    <div id="cat-container"></div>
  </div>

  <!-- 기록 조회 탭 -->
  <div id="page-records" style="display:none">

    <div id="admin-bar" class="admin-bar" style="display:none">
      <span style="font-size:13px;color:#818cf8;font-weight:600">👑 관리자 메뉴</span>
      <span id="rec-count" style="font-size:12px;color:#64748b"></span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-admin" onclick="exportCSV()">📊 CSV 다운로드</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑 전체 삭제</button>
      </div>
    </div>

    <div class="filter-bar">
      <select class="filter-select" onchange="onFilterDept(this.value)">
        <option value="">전체 소속/공정</option>
        <option>1본부 조립1팀</option>
        <option>1본부 조립2팀</option>
        <option>1본부 조립3팀(1층)</option>
        <option>1본부 조립3팀(2층)</option>
        <option>2본부 가공1팀 1파트</option>
        <option>2본부 가공1팀 2파트</option>
        <option>2본부 가공2팀</option>
        <option>2본부 조립팀 조립1파트</option>
        <option>2본부 조립팀 조립2파트</option>
      </select>
      <select class="filter-select" style="flex:0;min-width:130px" onchange="onFilterType(this.value)">
        <option value="">전체 구분</option>
        <option value="daily">일일점검</option>
        <option value="weekly">주간점검</option>
        <option value="monthly">월간점검</option>
      </select>
    </div>

    <div id="records-container">
      <div class="empty"><div style="font-size:36px;margin-bottom:12px">⏳</div><div>기록을 불러오는 중...</div></div>
    </div>
  </div>

</div><!-- /inner -->

<!-- 저장 바 -->
<div id="submit-bar" class="submit-bar">
  <button class="btn btn-ghost" onclick="resetCheck()">🔄 초기화</button>
  <button id="save-btn" class="btn btn-success" onclick="handleSubmit()">💾 점검 완료 저장</button>
</div>

<!-- 관리자 모달 -->
<div id="admin-modal" class="modal-overlay" onclick="if(event.target===this)closeAdminModal()">
  <div class="modal-box" style="max-width:360px">
    <div class="modal-title">🔐 관리자 인증</div>
    <p style="font-size:12px;color:#64748b;margin-bottom:16px">비밀번호 입력 시 CSV 다운로드 및 기록 삭제가 활성화됩니다.</p>
    <div class="pw-field">
      <label class="pw-label">비밀번호</label>
      <input id="admin-pw-input" type="password" class="pw-input" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter')handleAdminLogin()">
      <span id="pw-error" class="pw-error">비밀번호가 올바르지 않습니다.</span>
    </div>
    <div class="modal-actions">
      <button class="btn btn-admin" onclick="handleAdminLogin()">확인</button>
      <button class="btn btn-ghost" onclick="closeAdminModal()">취소</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div id="detail-modal" class="modal-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <div class="modal-title">
      점검 상세 기록
      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="closeDetail()">✕ 닫기</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
</body>
</html>
