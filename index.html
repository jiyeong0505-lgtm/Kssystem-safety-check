import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot, Timestamp }

// ── Firebase 설정 ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD2MCc94O3-_FJHSNOwWLNJ4-l4EUD0-ik",
  authDomain: "kssystem-safety-check.firebaseapp.com",
  projectId: "kssystem-safety-check",
  storageBucket: "kssystem-safety-check.firebasestorage.app",
  messagingSenderId: "825036230785",
  appId: "1:825036230785:web:de9d6d9bfca993f4487d80"
};

const db  = getFirestore(app);
const COL = "safety_records";

// ── 상수 ──────────────────────────────────────────────
const ADMIN_PW = "admin1234"; // ← 원하는 비밀번호로 변경

const DEPT_OPTIONS = [
  "1본부 조립1팀","1본부 조립2팀","1본부 조립3팀(1층)","1본부 조립3팀(2층)",
  "2본부 가공1팀 1파트","2본부 가공1팀 2파트","2본부 가공2팀",
  "2본부 조립팀 조립1파트","2본부 조립팀 조립2파트"
];

const CATEGORIES = [
  { id:"safety", icon:"🔥", color:"#ef4444", bg:"rgba(239,68,68,0.12)", title:"안전 / 화재 점검",
    items:[
      {id:"s1",text:"소화기 위치 확인 및 압력 정상 여부",tag:"daily"},
      {id:"s2",text:"비상구 및 피난통로 장애물 없음",tag:"daily"},
      {id:"s3",text:"안전통로(황색선) 내 물건 적재 없음",tag:"daily"},
      {id:"s4",text:"화재감지기 및 경보장치 정상 작동",tag:"weekly"},
      {id:"s5",text:"가연성 물질 지정장소 보관 여부",tag:"daily"},
      {id:"s6",text:"전기배선 피복 손상 및 과부하 없음",tag:"weekly"},
      {id:"s7",text:"위험물 경고 표지판 부착 상태",tag:"monthly"},
    ]},
  { id:"equip", icon:"⚙️", color:"#3b82f6", bg:"rgba(59,130,246,0.12)", title:"설비 / 기계 점검",
    items:[
      {id:"e1",text:"기계 방호장치 (커버, 가드) 설치 및 정상",tag:"daily"},
      {id:"e2",text:"비상정지 버튼 작동 정상 여부",tag:"daily"},
      {id:"e3",text:"기계 오일·유압·냉각수 누설 없음",tag:"daily"},
      {id:"e4",text:"기계 소음·진동 이상 없음",tag:"daily"},
      {id:"e5",text:"설비 점검 태그 / 작업지시서 부착 여부",tag:"weekly"},
      {id:"e6",text:"전동공구 및 수공구 손상 없음",tag:"weekly"},
      {id:"e7",text:"정기 검사 기한 도래 설비 확인",tag:"monthly"},
    ]},
  { id:"5s", icon:"🧹", color:"#10b981", bg:"rgba(16,185,129,0.12)", title:"환경 / 정리정돈 (5S)",
    items:[
      {id:"f1",text:"작업 구역 내 불필요한 물건 없음 (정리)",tag:"daily"},
      {id:"f2",text:"물건 지정위치 보관 및 표식 확인 (정돈)",tag:"daily"},
      {id:"f3",text:"바닥·작업대 청결 상태 (청소)",tag:"daily"},
      {id:"f4",text:"청결 기준 및 유지 규칙 현장 부착 (청결)",tag:"weekly"},
      {id:"f5",text:"5S 습관화 및 표준 준수 여부 (습관화)",tag:"weekly"},
      {id:"f6",text:"폐기물 분리수거 및 처리 적정 여부",tag:"daily"},
    ]},
  { id:"ppe", icon:"🦺", color:"#f59e0b", bg:"rgba(245,158,11,0.12)", title:"작업자 보호구 착용",
    items:[
      {id:"p1",text:"안전모 착용 및 상태 이상 없음",tag:"daily"},
      {id:"p2",text:"안전화 착용 (발등 보호 기준 충족)",tag:"daily"},
      {id:"p3",text:"보호안경 / 안면보호구 착용 (해당 공정)",tag:"daily"},
      {id:"p4",text:"방진·방독 마스크 착용 (해당 공정)",tag:"daily"},
      {id:"p5",text:"내화학·내열 장갑 착용 (해당 공정)",tag:"daily"},
      {id:"p6",text:"보호구 보관함 정리 및 재고 확인",tag:"weekly"},
      {id:"p7",text:"불량·노후 보호구 교체 요청 여부",tag:"monthly"},
    ]},
];
const ALL_ITEMS = CATEGORIES.flatMap(c => c.items);

// ── 유틸 ──────────────────────────────────────────────
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate  = (iso) => { const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const tagLabel = { daily:"일일", weekly:"주간", monthly:"월간" };
const tagColor = { daily:"#60a5fa", weekly:"#fbbf24", monthly:"#c084fc" };
const tagBg    = { daily:"rgba(59,130,246,0.15)", weekly:"rgba(245,158,11,0.15)", monthly:"rgba(168,85,247,0.15)" };

// ── 앱 상태 ───────────────────────────────────────────
let records    = [];
let checkState = {}; // itemId -> ok|ng|na
let noteState  = {}; // itemId -> string
let openNotes  = {}; // itemId -> bool
let openCats   = { safety:true, equip:true, "5s":true, ppe:true };
let dept       = "";
let checkType  = "일일점검";
let isAdmin    = false;
let editingId  = null; // Firestore doc id
let currentTab = "check";
let detailRec  = null;
let filterDept = "";
let filterType = "";

// ── Firestore 실시간 수신 ──────────────────────────────
const q = query(collection(db, COL), orderBy("date","desc"));
onSnapshot(q, snap => {
  records = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  if (currentTab === "records") renderRecords();
  updateSyncBadge();
});

function updateSyncBadge() {
  const el = document.getElementById("sync-time");
  if (el) el.textContent = "동기화 " + fmtDate(new Date().toISOString());
}

// ── 저장 ──────────────────────────────────────────────
async function handleSubmit() {
  if (!dept) { showToast("소속/공정을 선택해주세요.", "error"); return; }
  const answered = ALL_ITEMS.filter(i => checkState[i.id]);
  if (!answered.length) { showToast("최소 1개 이상 점검 결과를 입력해주세요.", "error"); return; }

  if (!editingId) {
    const today = todayStr();
    const dup = records.find(r => r.date?.slice(0,10) === today && r.dept === dept && r.type === checkType);
    if (dup) { showToast(`오늘 ${dept} ${checkType} 기록이 이미 있습니다.\n기록 조회에서 수정하세요.`, "error"); return; }
  }

  const results = {}, notes = {};
  ALL_ITEMS.forEach(i => {
    results[i.id] = checkState[i.id] || null;
    if (noteState[i.id]) notes[i.id] = noteState[i.id];
  });

  const payload = { dept, type: checkType, results, notes };

  try {
    if (editingId) {
      await updateDoc(doc(db, COL, editingId), { ...payload, updatedAt: new Date().toISOString() });
      showToast("수정 완료! ✓", "success");
    } else {
      await addDoc(collection(db, COL), { ...payload, date: new Date().toISOString() });
      showToast("점검 기록 저장 완료! ✓", "success");
    }
    resetCheck();
    setTimeout(() => switchTab("records"), 800);
  } catch(e) {
    showToast("저장 실패. 네트워크를 확인해주세요.", "error");
  }
}

// ── 수정 모드 진입 ─────────────────────────────────────
function startEdit(rec) {
  checkState = {}; noteState = {}; openNotes = {};
  ALL_ITEMS.forEach(i => {
    if (rec.results?.[i.id]) checkState[i.id] = rec.results[i.id];
    if (rec.notes?.[i.id])   noteState[i.id]  = rec.notes[i.id];
  });
  dept      = rec.dept;
  checkType = rec.type;
  editingId = rec._id;
  switchTab("check");
  renderCheckTab();
  window.scrollTo({top:0, behavior:"smooth"});
  showToast("수정 모드: 변경 후 저장하세요.", "");
}

// ── 삭제 ──────────────────────────────────────────────
async function deleteRecord(id) {
  if (!confirm("이 기록을 삭제하시겠습니까?")) return;
  try { await deleteDoc(doc(db, COL, id)); showToast("삭제되었습니다.", "success"); }
  catch { showToast("삭제 실패.", "error"); }
}

async function clearAll() {
  if (!confirm("모든 기록을 삭제합니까? 되돌릴 수 없습니다.")) return;
  try {
    await Promise.all(records.map(r => deleteDoc(doc(db, COL, r._id))));
    showToast("전체 삭제 완료.", "success");
  } catch { showToast("삭제 실패.", "error"); }
}

// ── CSV ───────────────────────────────────────────────
function exportCSV() {
  if (!records.length) { showToast("내보낼 기록이 없습니다.", "error"); return; }
  const headers = ["점검ID","일시","소속/공정","점검구분",...ALL_ITEMS.map(i=>i.text),"OK수","NG수","NA수"];
  const rows = records.map(rec => {
    const ok = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="ok").length;
    const ng = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="ng").length;
    const na = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="na").length;
    return [rec._id, fmtDate(rec.date), rec.dept, rec.type,
      ...ALL_ITEMS.map(i=>rec.results?.[i.id]||""), ok, ng, na];
  });
  const csv = "\uFEFF" + [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})), download:`안전점검_${todayStr()}.csv` });
  a.click();
  showToast("CSV 다운로드 완료!", "success");
}

// ── 초기화 ────────────────────────────────────────────
function resetCheck() {
  checkState = {}; noteState = {}; openNotes = {};
  dept = ""; editingId = null;
  document.getElementById("dept-select").value = "";
  renderCheckTab();
}

// ── 탭 전환 ───────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tab-check").classList.toggle("tab-active", tab==="check");
  document.getElementById("tab-records").classList.toggle("tab-active", tab==="records");
  document.getElementById("page-check").style.display   = tab==="check"   ? "" : "none";
  document.getElementById("page-records").style.display = tab==="records" ? "" : "none";
  document.getElementById("submit-bar").style.display   = tab==="check"   ? "" : "none";
  if (tab==="records") renderRecords();
}

// ── 체크 상태 요약 ────────────────────────────────────
function getSummary() {
  return {
    ok: ALL_ITEMS.filter(i=>checkState[i.id]==="ok").length,
    ng: ALL_ITEMS.filter(i=>checkState[i.id]==="ng").length,
    na: ALL_ITEMS.filter(i=>checkState[i.id]==="na").length,
    total: ALL_ITEMS.length,
  };
}

// ── 렌더: 점검 탭 ─────────────────────────────────────
function renderCheckTab() {
  const { ok, ng, na, total } = getSummary();
  document.getElementById("sum-total").textContent = total;
  document.getElementById("sum-ok").textContent    = ok;
  document.getElementById("sum-ng").textContent    = ng;
  document.getElementById("sum-na").textContent    = na;

  const editBanner = document.getElementById("edit-banner");
  editBanner.style.display = editingId ? "" : "none";

  const saveBtn = document.getElementById("save-btn");
  if (editingId) {
    saveBtn.textContent = "✏️ 수정 완료 저장";
    saveBtn.style.background = "#f59e0b"; saveBtn.style.color = "#000";
  } else {
    saveBtn.textContent = "💾 점검 완료 저장";
    saveBtn.style.background = "#10b981"; saveBtn.style.color = "#fff";
  }

  // 카테고리
  const container = document.getElementById("cat-container");
  container.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const done = cat.items.filter(i=>checkState[i.id]).length;
    const pct  = Math.round(done/cat.items.length*100);
    const pColor = pct===100?"#10b981":pct>50?"#3b82f6":"#f59e0b";
    const open = openCats[cat.id];

    const div = document.createElement("div");
    div.className = "cat-block";
    div.innerHTML = `
      <div class="cat-head" onclick="toggleCat('${cat.id}')">
        <div class="cat-icon" style="background:${cat.bg};color:${cat.color}">${cat.icon}</div>
        <div>
          <div class="cat-title">${cat.title}</div>
          <div class="cat-sub">${cat.items.length}개 항목</div>
        </div>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pColor}"></div></div>
          <span class="prog-txt">${done}/${cat.items.length}</span>
          <span class="arrow" style="transform:${open?'':'rotate(-90deg)'}"">▾</span>
        </div>
      </div>
      <div class="cat-body" id="catbody-${cat.id}" style="display:${open?'':'none'}">
        ${cat.items.map((item,idx) => `
          <div class="check-item" id="item-${item.id}">
            <div class="item-content">
              <div class="item-txt">${item.text}</div>
              <span class="tag-pill" style="background:${tagBg[item.tag]};color:${tagColor[item.tag]}">${tagLabel[item.tag]}</span>
            </div>
            <div class="btn-row">
              <button class="chk-btn ${checkState[item.id]==='ok'?'chk-ok':''}" onclick="setCheck('${item.id}','ok')" title="정상">✓</button>
              <button class="chk-btn ${checkState[item.id]==='ng'?'chk-ng':''}" onclick="setCheck('${item.id}','ng')" title="불량">✕</button>
              <button class="chk-btn ${checkState[item.id]==='na'?'chk-na':''}" onclick="setCheck('${item.id}','na')" title="해당없음">—</button>
              <button class="note-btn" onclick="toggleNote('${item.id}')" title="메모">📝</button>
            </div>
          </div>
          <div class="note-area" id="note-${item.id}" style="display:${openNotes[item.id]||noteState[item.id]?'':'none'}">
            <textarea placeholder="특이사항 메모..." oninput="saveNote('${item.id}',this.value)">${noteState[item.id]||''}</textarea>
          </div>
          ${idx<cat.items.length-1?'<div class="item-divider"></div>':''}
        `).join('')}
      </div>
    `;
    container.appendChild(div);
  });
}

function toggleCat(id) {
  openCats[id] = !openCats[id];
  renderCheckTab();
}

function setCheck(itemId, type) {
  if (checkState[itemId] === type) delete checkState[itemId];
  else checkState[itemId] = type;
  renderCheckTab();
}

function toggleNote(itemId) {
  openNotes[itemId] = !openNotes[itemId];
  const el = document.getElementById(`note-${itemId}`);
  if (el) el.style.display = openNotes[itemId]||noteState[itemId] ? "" : "none";
}

function saveNote(itemId, val) { noteState[itemId] = val; }

// ── 렌더: 기록 탭 ─────────────────────────────────────
function renderRecords() {
  const container = document.getElementById("records-container");
  let list = records;
  if (filterDept) list = list.filter(r => r.dept?.includes(filterDept));
  if (filterType) list = list.filter(r => r.type === filterType);

  if (!list.length) {
    container.innerHTML = `<div class="empty"><div style="font-size:36px;margin-bottom:12px">📭</div><div>저장된 점검 기록이 없습니다.</div></div>`;
    return;
  }

  container.innerHTML = list.map(rec => {
    const rOk = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="ok").length;
    const rNg = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="ng").length;
    const rNa = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="na").length;
    const ans  = rOk+rNg+rNa;
    const total= ALL_ITEMS.length;
    const ngItems = ALL_ITEMS.filter(i=>rec.results?.[i.id]==="ng");
    const badgeClass = rNg>0?"badge-fail":ans===total?"badge-pass":"badge-inc";
    const badgeTxt   = rNg>0?"⚠ NG 있음":ans===total?"✓ 완료":"⏳ 부분점검";
    const ngBox = ngItems.length ? `
      <div class="ng-box">
        <div class="ng-title">⚠ NG 항목</div>
        ${ngItems.map(i=>`<div>• ${i.text}</div>`).join('')}
      </div>` : '';
    const updTxt = rec.updatedAt ? `<div class="upd-txt">✏️ 수정됨: ${fmtDate(rec.updatedAt)}</div>` : '';
    const delBtn = isAdmin ? `<button class="btn btn-danger" onclick="deleteRecord('${rec._id}')">🗑 삭제</button>` : '';

    return `
      <div class="rec-card">
        <div class="rec-head">
          <span class="rec-id">#${rec._id.slice(-6)}</span>
          <span class="badge ${badgeClass}">${badgeTxt}</span>
          <span class="rec-date">${fmtDate(rec.date)}</span>
        </div>
        <div class="rec-meta">
          <span>🏭 ${rec.dept}</span>
          <span>📋 ${rec.type}</span>
          <span>✍ ${ans}/${total}</span>
        </div>
        <div class="stat-row">
          <span class="stat-pill pill-ok">✓ OK ${rOk}</span>
          <span class="stat-pill pill-ng">✕ NG ${rNg}</span>
          <span class="stat-pill pill-na">— N/A ${rNa}</span>
        </div>
        ${ngBox}
        <div class="rec-actions">
          <button class="btn btn-ghost" onclick='showDetail(${JSON.stringify(rec).replace(/'/g,"&#39;")})'>🔍 상세보기</button>
          <button class="btn btn-primary" onclick='startEdit(${JSON.stringify(rec).replace(/'/g,"&#39;")})'>✏️ 수정</button>
          ${delBtn}
        </div>
        ${updTxt}
      </div>
    `;
  }).join('');
}

// ── 상세 모달 ─────────────────────────────────────────
function showDetail(rec) {
  detailRec = rec;
  let html = `
    <div class="detail-row"><span class="dk">소속/공정</span><span>${rec.dept}</span></div>
    <div class="detail-row"><span class="dk">점검구분</span><span>${rec.type}</span></div>
    <div class="detail-row"><span class="dk">점검일시</span><span>${fmtDate(rec.date)}</span></div>
    ${rec.updatedAt?`<div class="detail-row"><span class="dk">수정일시</span><span>${fmtDate(rec.updatedAt)}</span></div>`:''}
  `;
  CATEGORIES.forEach(cat => {
    html += `<div class="detail-cat">${cat.icon} ${cat.title}</div>`;
    cat.items.forEach(item => {
      const r = rec.results?.[item.id];
      const dotColor = r==="ok"?"#10b981":r==="ng"?"#ef4444":"#475569";
      const lbl = r==="ok"?"<span style='color:#10b981'>OK</span>":r==="ng"?"<span style='color:#ef4444'>NG</span>":r==="na"?"<span style='color:#64748b'>N/A</span>":"<span style='color:#475569'>미점검</span>";
      const note = rec.notes?.[item.id] ? `<div style='font-size:11px;color:#f59e0b;margin-top:2px'>📝 ${rec.notes[item.id]}</div>` : '';
      html += `<div class="detail-row"><span class="dk" style="display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:${dotColor};display:inline-block"></span>${lbl}</span><span>${item.text}${note}</span></div>`;
    });
  });
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("detail-modal").style.display = "flex";
}

// ── 관리자 로그인 ──────────────────────────────────────
function handleAdminLogin() {
  const pw = document.getElementById("admin-pw-input").value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    document.getElementById("admin-modal").style.display = "none";
    document.getElementById("admin-pw-input").value = "";
    document.getElementById("admin-badge").style.display = "";
    document.getElementById("admin-login-btn").style.display = "none";
    document.getElementById("pw-error").style.display = "none";
    showToast("관리자 모드 활성화!", "success");
    if (currentTab==="records") renderRecords();
  } else {
    document.getElementById("pw-error").style.display = "";
  }
}

// ── 토스트 ────────────────────────────────────────────
function showToast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (type?" toast-"+type:"");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

// ── 시계 ──────────────────────────────────────────────
function startClock() {
  const el = document.getElementById("clock");
  const tick = () => { if(el) el.textContent = fmtDate(new Date().toISOString()); };
  tick(); setInterval(tick, 1000);
}

// ── 전역 함수 노출 ────────────────────────────────────
window.switchTab     = switchTab;
window.setCheck      = setCheck;
window.toggleCat     = toggleCat;
window.toggleNote    = toggleNote;
window.saveNote      = saveNote;
window.startEdit     = startEdit;
window.deleteRecord  = deleteRecord;
window.clearAll      = clearAll;
window.exportCSV     = exportCSV;
window.showDetail    = showDetail;
window.handleAdminLogin = handleAdminLogin;
window.handleSubmit  = handleSubmit;
window.resetCheck    = () => { checkState={}; noteState={}; openNotes={}; dept=""; editingId=null; document.getElementById("dept-select").value=""; document.getElementById("type-select").value="일일점검"; checkType="일일점검"; renderCheckTab(); };
window.closeDetail   = () => { document.getElementById("detail-modal").style.display="none"; };
window.openAdminModal= () => { document.getElementById("admin-modal").style.display="flex"; };
window.closeAdminModal=() => { document.getElementById("admin-modal").style.display="none"; document.getElementById("admin-pw-input").value=""; document.getElementById("pw-error").style.display="none"; };
window.onFilterDept  = (v) => { filterDept=v; renderRecords(); };
window.onFilterType  = (v) => { filterType=v; renderRecords(); };
window.onDeptChange  = (v) => { dept=v; };
window.onTypeChange  = (v) => { checkType=v; };

// ── 초기 실행 ─────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  startClock();
  renderCheckTab();
});
</script>

.btn{padding:11px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s}

.filter-bar{background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}

      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="closeDetail()">✕ 닫기</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast" class="toast"></div>

<script>
// 관리자 로그인 후 admin-bar 표시 연동
const _origAdminLogin = window.handleAdminLogin;
window.handleAdminLogin = function() {
  _origAdminLogin();
  if(window.isAdmin !== undefined) return; // module scope 변수 접근 불가, DOM으로 확인
  const badge = document.getElementById('admin-badge');
  if(badge && badge.style.display !== 'none') {
    document.getElementById('admin-bar').style.display = '';
    document.getElementById('rec-count').textContent = '';
  }
};
// onSnapshot 이후 admin-bar 갱신을 위해 renderRecords 확장
const _origRenderRecords = window.renderRecords || function(){};
// admin-bar 표시는 관리자 badge 노출 여부로 판단
document.addEventListener('DOMContentLoaded', () => {
  const observer = new MutationObserver(() => {
    const badge = document.getElementById('admin-badge');
    const bar   = document.getElementById('admin-bar');
    if(badge && bar) bar.style.display = badge.style.display === 'none' ? 'none' : '';
  });
  observer.observe(document.getElementById('admin-badge'), {attributes:true, attributeFilter:['style']});
});
</script>
</body>
</html>
